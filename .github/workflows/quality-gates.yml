name: Quality Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: quality-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dashboard-and-snapshot-gates:
    name: Dashboard + Snapshot Gates
    runs-on: ubuntu-latest

    env:
      APP_ENV: testing
      APP_DEBUG: true
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      BROADCAST_CONNECTION: log
      AI_PROVIDER: rule_based
      AI_ASSISTANT_ENABLED: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p database
          touch database/database.sqlite

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Check conflict markers in source files
  run: |
    if git grep "<<<<<<<\|=======\|>>>>>>>" -- resources app routes config; then
      echo "Conflict markers found!"
      exit 1
    fi

      - name: Run full Laravel test suite
        run: php artisan test
